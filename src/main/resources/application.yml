server:
  port: ${PORT:8080}
spring:
  # Optional local overrides (gitignored): copy application-local.yml.example → application-local.yml
  config:
    import: optional:classpath:application-local.yml
  application:
    name: sensex-option-trader
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:sensex_trader}?sslmode=${DB_SSL_MODE:disable}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc.time_zone: Asia/Kolkata
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      ssl:
        enabled: ${REDIS_SSL:false}
  jackson:
    serialization.write-dates-as-timestamps: false
    default-property-inclusion: non_null
    time-zone: Asia/Kolkata
app:
  jwt:
    secret: ${JWT_SECRET:Y2hhbmdlLW1lLWluLXByb2R1Y3Rpb24tdXNlLWF0LWxlYXN0LTY0LWNoYXJzLWxvbmchIQ==}
    access-token-expiry-ms: 3600000
    refresh-token-expiry-ms: 604800000
  # gRPC only — must match the ML service's gRPC listen port (e.g. settings.grpc_port / 50051).
  # Do NOT set this to the FastAPI/HTTP port (often 8000): the server returns HTTP, not gRPC frames,
  # and the client will see protobuf DecodeError / UNKNOWN. Use plaintext here; add TLS only if ML is TLS.
  ml-service:
    host: ${ML_SERVICE_HOST:localhost}
    port: ${ML_SERVICE_PORT:50051}
    tls: ${ML_SERVICE_TLS:false}
    timeout-ms: 30000
    backtest-timeout-ms: 300000
    live-prediction-interval-ms: ${LIVE_PREDICTION_INTERVAL_MS:15000}
    http-url: ${ML_SERVICE_HTTP_URL:}
  market:
    trading-hours-start: "09:15"
    trading-hours-end: "15:30"
    timezone: "Asia/Kolkata"
    angel-one:
      api-key: ${ANGEL_ONE_API_KEY:}
      client-code: ${ANGEL_ONE_CLIENT_CODE:}
      password: ${ANGEL_ONE_PASSWORD:}
      totp-secret: ${ANGEL_ONE_TOTP_SECRET:}
      base-url: ${ANGEL_ONE_BASE_URL:https://apiconnect.angelone.in}
      ws-url: ${ANGEL_ONE_WS_URL:wss://smartapisocket.angelone.in/smart-stream}
      subscription-mode: 3        # 1=LTP, 2=Quote (OHLC+LTP), 3=SnapQuote (full depth)
      reconnect-delay-ms: 5000
      token-refresh-interval-ms: 300000
      instruments:
        - name: BANKNIFTY
          exchange: nse_cm
          token: "99926009"
          exchange-type: 1         # 1 = NSE
  cache:
    prediction-ttl: 300
    options-chain-ttl: 180
    market-data-ttl: 60
management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
logging:
  level:
    root: INFO
    com.sensex.optiontrader: DEBUG